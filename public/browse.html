<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Anime - AnimeStream</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <a href="/" class="logo">Anime<span>Stream</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/browse" class="active">Browse</a>
    </nav>
    <div class="search-bar">
      <form action="/search" method="GET">
        <input type="text" name="q" placeholder="Search anime...">
        <button type="submit"><i class="fas fa-search"></i></button>
      </form>
    </div>
  </header>

  <div class="browse-header">
    <h1 class="browse-title">Browse Anime</h1>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterAnime('all')">All</button>
      <button class="filter-btn" onclick="filterAnime('sub')">Subbed</button>
      <button class="filter-btn" onclick="filterAnime('dub')">Dubbed</button>
      <button class="filter-btn" onclick="filterAnime('movie')">Movies</button>
      <button class="filter-btn" onclick="filterAnime('ova')">OVA</button>
    </div>
  </div>

  <section class="section">
    <div class="anime-grid" id="browse-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="footer-logo">Anime<span>Stream</span></div>
      <p class="footer-desc">Watch your favorite anime in HD quality with subtitles. Free anime streaming site.</p>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="#">DMCA</a>
        <a href="#">Privacy Policy</a>
      </div>
      <p class="footer-copy">&copy; 2026 AnimeStream. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/browse.js"></script>
</body>
</html>
