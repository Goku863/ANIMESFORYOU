<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Miruro · Watch Anime Online Free · Stream Sub & Dub in HD</title>
  <meta name="description" content="Watch anime online free in HD. Stream subbed and dubbed anime episodes with no ads, no signup.">
  <meta name="theme-color" content="#0b0b0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/miruro.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%230b0b0f' width='32' height='32' rx='8'/><text fill='%23a855f7' x='50%25' y='55%25' text-anchor='middle' dy='.1em' font-size='18' font-weight='bold'>M</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a href="#" class="logo" onclick="navigate('home');return false;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <span>Miruro</span>
        </a>
        <nav class="header-nav">
          <a href="#" onclick="navigate('home');return false;" data-nav="home" class="active">Home</a>
          <a href="#" onclick="navigate('trending');return false;" data-nav="trending">Trending</a>
          <a href="#" onclick="navigate('schedule');return false;" data-nav="schedule">Schedule</a>
          <a href="#" onclick="navigate('search-page');return false;" data-nav="search-page">Search</a>
        </nav>
        <div class="header-actions">
          <div class="search-box" id="searchBox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search anime..." oninput="handleSearch(this.value)">
          </div>
        </div>
        <button class="mobile-toggle" onclick="toggleMobile()">☰</button>
      </div>
    </header>

    <!-- Mobile Nav -->
    <div class="mobile-nav" id="mobileNav">
      <a href="#" onclick="navigate('home');closeMobile();return false;">Home</a>
      <a href="#" onclick="navigate('trending');closeMobile();return false;">Trending</a>
      <a href="#" onclick="navigate('schedule');closeMobile();return false;">Schedule</a>
      <a href="#" onclick="navigate('search-page');closeMobile();return false;">Search</a>
    </div>

    <main class="main">
      <!-- Home Page -->
      <section id="homePage" class="page">
        <div class="hero-section" id="heroSection"></div>
        <div class="container">
          <div class="section">
            <h2 class="section-title">Trending Now</h2>
            <div class="anime-row" id="trendingRow"></div>
          </div>
          <div class="section">
            <h2 class="section-title">Popular</h2>
            <div class="anime-grid" id="popularGrid"></div>
          </div>
          <div class="section">
            <h2 class="section-title">Latest Episodes</h2>
            <div class="episode-grid" id="latestEpisodes"></div>
          </div>
        </div>
      </section>

      <!-- Trending Page -->
      <section id="trendingPage" class="page" style="display:none">
        <div class="container">
          <h1 class="page-title">Trending Anime</h1>
          <div class="anime-grid" id="trendingGrid"></div>
        </div>
      </section>

      <!-- Schedule Page -->
      <section id="schedulePage" class="page" style="display:none">
        <div class="container">
          <h1 class="page-title">Airing Schedule</h1>
          <div class="schedule-grid" id="scheduleGrid"></div>
        </div>
      </section>

      <!-- Search Results Page -->
      <section id="searchPage" class="page" style="display:none">
        <div class="container">
          <h1 class="page-title" id="searchPageTitle">Search</h1>
          <div class="anime-grid" id="searchResults"></div>
        </div>
      </section>

      <!-- Info Page -->
      <section id="infoPage" class="page" style="display:none">
        <div class="info-backdrop" id="infoBackdrop"></div>
        <div class="container">
          <div class="info-layout">
            <div class="info-main">
              <div class="info-poster" id="infoPoster"></div>
              <div class="info-content">
                <h1 class="info-title" id="infoTitle"></h1>
                <div class="info-meta" id="infoMeta"></div>
                <p class="info-desc" id="infoDesc"></p>
                <div class="info-actions" id="infoActions"></div>
                <div class="info-details" id="infoDetails"></div>
                <div class="info-genres" id="infoGenres"></div>
              </div>
            </div>
            <div class="info-sidebar">
              <h3>Related</h3>
              <div id="relatedAnime"></div>
              <h3>Characters</h3>
              <div id="charactersList"></div>
            </div>
          </div>
          <div class="section">
            <h2 class="section-title">Episodes</h2>
            <div class="episode-grid" id="episodesList"></div>
          </div>
        </div>
      </section>

      <!-- Watch Page -->
      <section id="watchPage" class="page" style="display:none">
        <div class="container">
          <div class="watch-layout">
            <div class="watch-main">
              <div class="player-container" id="playerContainer">
                <div class="player-wrap" id="playerWrap">
                  <div class="player-loading">
                    <div class="spinner"></div>
                    <p>Loading player...</p>
                  </div>
                </div>
                <div class="player-controls" id="playerControls">
                  <button onclick="toggleFullscreen()" title="Fullscreen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                  </button>
                  <button onclick="openNewTab()" title="Open in new tab">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                  </button>
                </div>
              </div>
              <div class="watch-info">
                <div class="watch-breadcrumb" id="watchBreadcrumb"></div>
                <h1 class="watch-title" id="watchTitle"></h1>
                <div class="watch-meta" id="watchMeta"></div>
                <div class="watch-actions" id="watchActions"></div>
              </div>
              <div class="episode-section">
                <div class="episode-header">
                  <h3>Episodes</h3>
                  <span id="episodeCount">0</span>
                </div>
                <div class="episode-grid" id="watchEpisodes"></div>
              </div>
            </div>
            <div class="watch-sidebar">
              <div class="sidebar-section">
                <h3>Details</h3>
                <div id="watchDetails"></div>
              </div>
              <div class="sidebar-section">
                <h3>Related</h3>
                <div id="watchRelated"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="js/app.js"></script>
</body>
</html>
