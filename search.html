<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Anime - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">A</span>
                <span class="logo-text">AnimeStream</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="genre.html" class="nav-link">Genres</a>
            </nav>
            <div class="header-actions">
                <div class="search-box">
                    <form action="search.html" method="GET" id="searchForm">
                        <input type="text" name="q" placeholder="Search anime..." id="searchInput" autofocus>
                        <button type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>
                <a href="login.html" class="btn btn-outline">Login</a>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="genre.html">Genres</a>
            <a href="login.html">Login</a>
        </div>
    </header>

    <main class="container">
        <div class="search-page">
            <h1 id="searchTitle">Search Anime</h1>
            <div class="search-results" id="searchResults">
                <div class="loading">Searching...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 AnimeStream. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function initSearch() {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');

            if (!query) {
                document.getElementById('searchResults').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search" style="font-size: 3rem; opacity: 0.3; margin-bottom: 16px;"></i>
                        <p>Enter a search term to find anime</p>
                    </div>
                `;
                return;
            }

            document.getElementById('searchTitle').textContent = `Search results for "${query}"`;
            document.getElementById('searchInput').value = query;

            try {
                const results = await AnimeAPI.searchAnime(query, 20);

                if (results.length === 0) {
                    document.getElementById('searchResults').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-frown" style="font-size: 3rem; opacity: 0.3; margin-bottom: 16px;"></i>
                            <p>No results found for "${query}"</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById('searchResults').innerHTML = `
                    <div class="anime-grid">
                        ${results.map(anime => createAnimeCard(anime)).join('')}
                    </div>
                `;
            } catch (error) {
                document.getElementById('searchResults').innerHTML = `
                    <div class="empty-state">
                        <p>Search failed. Please try again.</p>
                    </div>
                `;
            }
        }

        function createAnimeCard(anime) {
            return `
                <a href="anime.html?id=${anime.id}" class="anime-card">
                    <div class="anime-poster">
                        <img src="${anime.image}" alt="${anime.title}" loading="lazy">
                        <div class="anime-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                        ${anime.score ? `<span class="anime-score"><i class="fas fa-star"></i> ${anime.score}</span>` : ''}
                        <span class="anime-type">${anime.type || 'TV'}</span>
                    </div>
                    <div class="anime-info">
                        <h3 class="anime-title">${anime.title}</h3>
                        <div class="anime-meta">
                            <span>${anime.episodes || '?'} Episodes</span>
                            <span>${anime.status || 'Airing'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('show');
        }

        document.addEventListener('DOMContentLoaded', initSearch);
    </script>
</body>
</html>
